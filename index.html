<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Mark Submission</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
  body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #141e30, #243b55);
  }

  .box {
    width: 360px;
    padding: 25px;
    border-radius: 16px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(18px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    color: white;
  }

  h2 {
    text-align: center;
    margin-bottom: 15px;
  }

  input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: none;
    border-radius: 10px;
    outline: none;
    font-size: 14px;
  }

  button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    color: white;
    font-size: 15px;
    cursor: pointer;
  }

  button:hover {
    transform: scale(1.03);
  }

  #status {
    text-align: center;
    margin-top: 10px;
    font-size: 14px;
  }
</style>
</head>

<body>

<div class="box">
  <h2>📊 Student Mark Form</h2>

  <input type="text" id="name" placeholder="Student Name">
  <input type="email" id="email" placeholder="Student Email">
  <input type="text" id="reg" placeholder="Registration Number">
  <input type="text" id="mark" placeholder="Mark">

  <button onclick="sendEmail()">Submit</button>

  <div id="status"></div>
</div>

<script>
  emailjs.init("3w-tn-G4yUG5a_fvn");

  function sendEmail() {
    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let reg = document.getElementById("reg").value.trim();
    let mark = document.getElementById("mark").value.trim();
    let status = document.getElementById("status");

    if (!name || !email || !reg || !mark) {
      status.style.color = "yellow";
      status.innerText = "⚠️ Please fill all fields!";
      return;
    }

    status.style.color = "white";
    status.innerText = "⏳ Sending...";

    let params = {
      student_name: name,
      student_email: email,
      student_reg: reg,
      mark: mark
    };

    emailjs.send("service_nf1xe3k", "template_i9sogf8", params)
      .then(() => {
        status.style.color = "#00ffcc";
        status.innerText = "✅ Submitted successfully!";

        document.getElementById("name").value = "";
        document.getElementById("email").value = "";
        document.getElementById("reg").value = "";
        document.getElementById("mark").value = "";
      })
      .catch((error) => {
        console.log(error);
        status.style.color = "red";
        status.innerText = "❌ Failed to send!";
      });
  }
</script>

</body>
</html>
